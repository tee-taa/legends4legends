<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-visual" />
  <title>Legends4Legends 2026</title>
  <meta name="description" content="Legends4Legends 2026 — invitation." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://legends4legends.org/invitation" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&family=Inter+Tight:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: 'Inter', sans-serif;
      background: #090028;
      color: #fff;
    }

    #bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: 0;
      opacity: 0.15;
      pointer-events: none;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
        filter: blur(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    .animate {
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.5s; }

    /* Main layout */
    .container {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 48px 24px;
    }

    @media (max-height: 700px) {
      .container { gap: 32px; padding: 32px 24px; }
    }

    /* Logo */
    .logo {
      display: block;
    }

    .logo img {
      width: min(65vw, 380px);
      height: auto;
      display: block;
    }

    .event-date {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.65);
      text-align: center;
    }

    .event-intro {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.65);
      text-align: center;
      line-height: 1.75;
      max-width: 460px;
    }

    .event-subtitle {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.55);
      text-align: center;
    }

    /* Form section */
    .form-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 460px;
    }

    .form-heading {
      text-align: center;
      margin-bottom: 4px;
    }

    .form-heading h1 {
      font-family: 'Inter Tight', sans-serif;
      font-size: clamp(36px, 5vw, 40px);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.92);
      line-height: 1.2;
      margin-top: 8px;
    }

    .form-instruction {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.55);
      text-align: center;
      line-height: 1.6;
      margin-top: -8px;
    }

    /* Form fields */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      width: 100%;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 100%;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      outline: none;
      padding: 12px 0;
      font-size: 16px;
      font-weight: 300;
      color: #fff;
      font-family: inherit;
      letter-spacing: 0.04em;
      transition: border-color 0.4s ease;
      margin-bottom: 20px;
    }

    .field input:focus {
      border-bottom-color: rgba(255, 255, 255, 0.7);
    }

    .field input::placeholder {
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 0.04em;
    }

    /* Submit button */
    .submit-btn {
      background: #fff;
      border: none;
      color: #000;
      width: 100%;
      padding: 14px 40px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      font-family: inherit;
      transition: opacity 0.3s ease, transform 0.3s ease;
      margin-top: 4px;
    }

    .submit-btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* Disclaimer */
    .disclaimer {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.03em;
      color: rgba(255, 255, 255, 0.35);
      text-align: center;
      line-height: 1.7;
    }

    /* Success state */
    .success-msg {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }

    .success-msg.visible {
      display: flex;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .success-msg .success-title {
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: rgba(255, 255, 255, 0.9);
    }

    .success-msg .success-sub {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.4);
      line-height: 1.7;
    }

    /* Checkbox field */
    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      margin-bottom: 24px;
      cursor: pointer;
    }

    .checkbox-field input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      min-width: 16px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: transparent;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
      position: relative;
    }

    .checkbox-field input[type="checkbox"]:checked {
      background: #fff;
      border-color: #fff;
    }

    .checkbox-field input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: 2px solid #090028;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .checkbox-field span {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.25);
      cursor: pointer;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .field-grid {
        grid-template-columns: 1fr;
      }
      .field.full {
        grid-column: 1;
      }
      .logo img {
        width: 85vw;
      }
    }
  </style>
</head>
<body>

  <video id="bg-video" autoplay muted loop playsinline preload="auto">
    <source src="bg-wih.mp4" type="video/mp4" />
  </video>

  <main class="container">

    <div class="animate delay-1" style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <a href="/" class="logo">
        <img src="logo.svg" alt="Legends 4 Legends 2026" />
      </a>
      <p class="event-date">Investor Dinner — September 30, 2026</p>
    </div>

    <div class="form-section animate delay-2">
      <form id="invitation-form" style="width:100%">
        <div class="field-grid">
          <div class="field">
            <input type="text" id="name" placeholder="Name" required />
          </div>
          <div class="field">
            <input type="email" id="email" placeholder="Email address" required autocomplete="email" />
          </div>
        </div>
        <label class="checkbox-field">
          <input type="checkbox" id="nextDay" checked />
          <span>I'd also like to attend the conference the next day</span>
        </label>
        <button type="submit" class="submit-btn" id="submit-btn">Accept invitation</button>
        <div class="success-msg" id="success">
          <p class="success-title">Thank you.</p>
          <p class="success-sub">We look forward to seeing you.</p>
        </div>
      </form>

      <p class="disclaimer">By submitting I agree that my personal data will be collected, processed and only be used by Theta Capital. The information is solely intended for the use of the addressee.</p>
    </div>

  </main>

  <script>
    const vid = document.getElementById('bg-video');
    vid.play().catch(() => {
      document.addEventListener('touchstart', () => vid.play(), { once: true });
    });

    const form = document.getElementById('invitation-form');
    const submitBtn = document.getElementById('submit-btn');
    const successMsg = document.getElementById('success');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const nextDay = document.getElementById('nextDay').checked;

      if (!name || !email) return;

      submitBtn.disabled = true;
      submitBtn.textContent = '—';

      try {
        const res = await fetch('/api/invitation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, nextDay }),
        });

        if (res.ok) {
          form.querySelector('.field-grid').style.display = 'none';
          submitBtn.style.display = 'none';
          successMsg.classList.add('visible');
        } else {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Accept invitation';
          alert('Something went wrong. Please try again.');
        }
      } catch {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Accept invitation';
        alert('Could not connect. Please try again.');
      }
    });
  </script>

</body>
</html>
